<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zanzibar University Attendance</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; color: white; margin-bottom: 5px; }
        #loginArea, #appArea { text-align: center; }
        #appArea { display: none; }
        /* Scrollable table */
        #tableContainer { height: 300px; overflow-y: auto; border: 1px solid #ddd; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; position: sticky; top: 0; }
        #adminArea { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginArea">
        <h2>Ingia (Login)</h2>
        <input type="email" id="email" placeholder="Email ya Mwanafunzi">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()" style="background:#007bff;">Ingia</button>
        <button onclick="signup()" style="background:#6c757d;">Jisajili (Sign Up)</button>
    </div>

    <div id="appArea">
        <h2>Zanzibar University Attendance</h2>
        <input type="text" id="name" placeholder="Jina Kamili">
        <input type="text" id="regNo" placeholder="Namba ya Usajili">
        <button id="submitBtn" style="background:#28a745;">Hifadhi Mahudhurio</button>
        <button onclick="logout()" style="background:#dc3545;">Toka (Logout)</button>
        <p id="message"></p>

        <div id="tableContainer">
            <table>
                <thead><tr><th>Jina</th><th>Namba</th><th>Muda</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="adminArea">
            <h4>Admin Control</h4>
            <input type="password" id="adminPass" placeholder="Admin Password">
            <button onclick="downloadCSV()" style="background-color: #007bff;">Download Ripoti (CSV)</button>
            <button onclick="clearData()" style="background-color: #dc3545;">Futa Data Zote</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDxeh9-9_3y7HuI77jpubKnbU39xcbojs0",
      authDomain: "attendancesystem-ecd0a.firebaseapp.com",
      databaseURL: "https://attendancesystem-ecd0a-default-rtdb.firebaseio.com",
      projectId: "attendancesystem-ecd0a",
      storageBucket: "attendancesystem-ecd0a.firebasestorage.app",
      messagingSenderId: "505261139314",
      appId: "1:505261139314:web:102548d4bc808ad31fa9eb"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    // Kurata za ZU
    const TARGET_LAT = -6.225432; 
    const TARGET_LONG = 39.311248;
    let currentData = [];

    // Auth Functions
    function signup() { auth.createUserWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value).catch(e => alert(e.message)); }
    function login() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value).catch(e => alert(e.message)); }
    function logout() { auth.signOut(); }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('loginArea').style.display = "none";
            document.getElementById('appArea').style.display = "block";
            loadData();
        } else {
            document.getElementById('loginArea').style.display = "block";
            document.getElementById('appArea').style.display = "none";
        }
    });

    // Attendance Function
    document.getElementById('submitBtn').addEventListener('click', () => {
        const n = document.getElementById('name').value;
        const r = document.getElementById('regNo').value;
        if(!n || !r) return alert("Jaza Jina na Namba!");

        navigator.geolocation.getCurrentPosition(pos => {
            const dist = getDist(pos.coords.latitude, pos.coords.longitude, TARGET_LAT, TARGET_LONG);
            if(dist <= 2.0) {
                db.ref('attendance/').push({ jina: n, namba: r, muda: new Date().toLocaleString() });
                document.getElementById('message').innerText = "✅ Imefanikiwa!";
            } else {
                document.getElementById('message').innerText = "❌ Upo nje ya eneo la Chuo. (" + (dist*1000).toFixed(0) + "m)";
            }
        }, () => alert("Washa GPS!"), {enableHighAccuracy: true, maximumAge: 0});
    });

    function loadData() {
        db.ref('attendance/').on('value', (s) => {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            currentData = [];
            s.forEach((c) => {
                const d = c.val();
                currentData.push(d);
                body.innerHTML += `<tr><td>${d.jina}</td><td>${d.namba}</td><td>${d.muda}</td></tr>`;
            });
        });
    }

    function downloadCSV() {
        if(document.getElementById('adminPass').value !== "admin123") return alert("Password si sahihi!");
        let csv = "Jina,Namba,Muda\n";
        currentData.forEach(row => { csv += `${row.jina},${row.namba},${row.muda}\n`; });
        const a = document.createElement('a');
        a.href = 'data:text/csv;charset=utf-8,' + encodeURI(csv);
        a.download = 'Ripoti_Mahudhurio.csv';
        a.click();
    }

    function clearData() {
        if(document.getElementById('adminPass').value === "admin123") {
            db.ref('attendance/').remove().then(() => alert("Data zimefutwa!"));
        } else {
            alert("Password si sahihi!");
        }
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
</body>
</html>
