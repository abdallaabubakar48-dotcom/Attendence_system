<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZU Attendance Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #2c3e50; --main: #f4f7f6; --accent: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--main); }
        
        #sidebar { width: 250px; background: var(--sidebar); color: white; padding: 20px; display: none; }
        #sidebar a { display: block; color: white; padding: 15px; text-decoration: none; cursor: pointer; }
        #sidebar a:hover { background: #34495e; }
        
        #content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; color: white; background: var(--accent); }
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3><i class="fa fa-university"></i> ZU Portal</h3>
    <a onclick="show('dashboard')"><i class="fa fa-home"></i> Dashboard</a>
    <a onclick="show('attendance')"><i class="fa fa-check-circle"></i> Mahudhurio</a>
    <a onclick="show('profile')"><i class="fa fa-user"></i> Profile</a>
    <a onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
</div>

<div id="content">
    <div id="loginPage" class="card active">
        <h2><i class="fa fa-lock"></i> Ingia</h2>
        <input type="email" id="email" placeholder="Email (mfano: student@zu.ac.tz)">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div id="dashboard" class="page">
        <h2>Dashboard</h2>
        <p>Karibu mwanafunzi kwenye mfumo wa mahudhurio ya ZU.</p>
    </div>

    <div id="attendance" class="page card">
        <h2>Hifadhi Mahudhurio</h2>
        <input type="text" id="name" placeholder="Jina Kamili">
        <input type="text" id="regNo" placeholder="Namba ya Usajili (mfano: BIT/2026/001)">
        <button onclick="saveAttendance()" class="btn-success">Hifadhi</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    // Config...
    const firebaseConfig = { /* Weka config yako hapa */ };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const db = firebase.database();

    function show(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(page).classList.add('active');
    }

    function login() {
        const email = document.getElementById('email').value;
        if(!email.endsWith('@zu.ac.tz')) return alert("Tumia email ya chuo!");
        auth.signInWithEmailAndPassword(email, document.getElementById('password').value)
        .then(() => {
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('loginPage').style.display = 'none';
            show('dashboard');
        });
    }

    function saveAttendance() {
        const reg = document.getElementById('regNo').value;
        if(!/^[A-Z]{3}\/\d{4}\/\d{3}$/.test(reg)) return alert("Namba ya usajili si sahihi! (Format: BIT/2026/001)");
        
        navigator.geolocation.getCurrentPosition(pos => {
            const d = getDist(pos.coords.latitude, pos.coords.longitude, -6.225432, 39.311248);
            if(d <= 2.0) {
                db.ref('attendance/' + auth.currentUser.uid).set({
                    jina: document.getElementById('name').value,
                    namba: reg,
                    muda: new Date().toLocaleString()
                });
                alert("Mahudhurio yamehifadhiwa!");
            } else alert("Upo nje ya eneo!");
        });
    }

    function getDist(lat1, lon1, lat2, lon2) {
        // ... (Function yako ya geofence)
    }
</script>
</body>
</html>
