<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    // 1. Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDxeh9-9_3y7HuI77jpubKnbU39xcbojs0",
      authDomain: "attendancesystem-ecd0a.firebaseapp.com",
      databaseURL: "https://attendancesystem-ecd0a-default-rtdb.firebaseio.com",
      projectId: "attendancesystem-ecd0a",
      storageBucket: "attendancesystem-ecd0a.firebasestorage.app",
      messagingSenderId: "505261139314",
      appId: "1:505261139314:web:102548d4bc808ad31fa9eb"
    };

    // 2. Initialize Firebase kwanza kabisa
    const app = firebase.initializeApp(firebaseConfig);

    // 3. Hakikisha auth na db zinatumia ile 'app' iliyo-initializewa
    const auth = app.auth();
    const db = app.database();

    // Sasa unaweza kuzitumia bila kupata kosa hilo
    function loginUser() {
        const email = document.getElementById('logEmail').value;
        const pass = document.getElementById('logPass').value;
        
        auth.signInWithEmailAndPassword(email, pass)
        .then(() => {
            document.getElementById('sidebar').style.display = 'block';
            show('dashboard');
        })
        .catch(e => alert(e.message));
    }

    function signupUser() {
        const email = document.getElementById('signEmail').value;
        const pass = document.getElementById('signPass').value;
        const reg = document.getElementById('regNo').value;
        const phone = document.getElementById('phone').value;

        auth.createUserWithEmailAndPassword(email, pass)
        .then((userCred) => {
            db.ref('users/' + userCred.user.uid).set({ regNo: reg, phone: phone });
            alert("Usajili umefanikiwa!");
            show('loginPage');
        })
        .catch(e => alert(e.message));
    }
    
    // ... endelea na functions nyingine hapa chini
</script>
