<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Attendance System - SUZA</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mahudhurio - Zanzibar University</h2>
    <input type="text" id="name" placeholder="Jina Kamili">
    <input type="text" id="regNo" placeholder="Namba ya Usajili">
    <button id="submitBtn">Hifadhi Mahudhurio</button>
    <p id="message"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDxeh9-9_3y7HuI77jpubKnbU39xcbojs0",
      authDomain: "attendancesystem-ecd0a.firebaseapp.com",
      databaseURL: "https://attendancesystem-ecd0a-default-rtdb.firebaseio.com",
      projectId: "attendancesystem-ecd0a",
      storageBucket: "attendancesystem-ecd0a.firebasestorage.app",
      messagingSenderId: "505261139314",
      appId: "1:505261139314:web:102548d4bc808ad31fa9eb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Kuratibu za Zanzibar University (Lat: -6.183, Long: 39.266 - mfano)
    const SUZA_LAT = -6.183; 
    const SUZA_LONG = 39.266;

    document.getElementById('submitBtn').addEventListener('click', () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(checkLocation, (err) => {
                alert("Tafadhali ruhusu eneo (Location) ili uweze kuhifadhi.");
            });
        } else {
            alert("Kivinjari chako hakikubali Location.");
        }
    });

    function checkLocation(position) {
        const userLat = position.coords.latitude;
        const userLong = position.coords.longitude;
        
        // Pima umbali (kama uko ndani ya mita 500)
        const distance = getDistance(userLat, userLong, SUZA_LAT, SUZA_LONG);
        
        if (distance < 0.5) { // 0.5km = 500m
            saveData();
        } else {
            document.getElementById('message').innerText = "Huwezi kuweka mahudhurio, hupo Zanzibar University!";
            document.getElementById('message').style.color = "red";
        }
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function saveData() {
        const name = document.getElementById('name').value;
        const regNo = document.getElementById('regNo').value;
        db.ref('attendance/').push({ jina: name, namba: regNo, muda: new Date().toLocaleString() });
        document.getElementById('message').innerText = "Mahudhurio yamehifadhiwa!";
        document.getElementById('message').style.color = "green";
    }
</script>
</body>
</html>
