<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>ZU Attendance Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --sidebar: #2c3e50; --primary: #0056b3; }
        body { font-family: sans-serif; display: flex; margin: 0; }
        #sidebar { width: 220px; background: var(--sidebar); height: 100vh; color: white; display: none; padding-top: 20px; }
        .menu-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #34495e; }
        .dropdown { padding-left: 30px; font-size: 0.9em; background: #34495e; display: none; }
        #content { flex-grow: 1; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; }
        button { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="menu-item" onclick="toggleDrop('studentDrop')"><i class="fa fa-user"></i> Mwanafunzi</div>
    <div id="studentDrop" class="dropdown">
        <div class="menu-item" onclick="show('attend')">Mahudhurio</div>
        <div class="menu-item" onclick="show('profile')">Profile</div>
    </div>
    <div class="menu-item" onclick="toggleDrop('adminDrop')"><i class="fa fa-shield"></i> Admin</div>
    <div id="adminDrop" class="dropdown">
        <div class="menu-item" onclick="downloadCSV()">Download Ripoti</div>
        <div class="menu-item" onclick="show('settings')">Badili Password</div>
    </div>
    <div class="menu-item" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</div>
</div>

<div id="content">
    <div id="loginPage" class="card active page">
        <h2>Ingia</h2>
        <input type="email" id="logEmail" placeholder="Email">
        <input type="password" id="logPass" placeholder="Password">
        <button onclick="loginUser()">Ingia</button>
    </div>

    <div id="attend" class="card page">
        <h2>Mahudhurio</h2>
        <input type="text" id="name" placeholder="Jina Kamili">
        <input type="text" id="regNo" placeholder="Reg No (e.g. BIT/2026/001)">
        <button onclick="submitAttendance()" style="background:green;">Hifadhi</button>
    </div>

    <div id="profile" class="card page">
        <h2>Profile Yako</h2>
        <input type="file" id="profilePic">
        <button onclick="uploadProfile()">Hifadhi Picha</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>

<script>
    const app = firebase.initializeApp({ /* Weka Config Yako Hapa */ });
    const auth = app.auth(); const db = app.database(); const storage = app.storage();

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleDrop(id) {
        let el = document.getElementById(id);
        el.style.display = el.style.display === "block" ? "none" : "block";
    }

    // Geofencing Check
    function submitAttendance() {
        navigator.geolocation.getCurrentPosition(pos => {
            const d = getDist(pos.coords.latitude, pos.coords.longitude, -6.225432, 39.311248);
            if(d <= 2.0) {
                db.ref('attendance/').push({
                    jina: document.getElementById('name').value,
                    namba: document.getElementById('regNo').value,
                    muda: new Date().toLocaleString()
                });
                alert("Imefanikiwa!");
            } else alert("Upo nje ya eneo la Chuo!");
        });
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function logout() { auth.signOut().then(() => location.reload()); }
</script>
</body>
</html>
