<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZU Attendance Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0056b3; --sidebar: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: var(--sidebar); color: white; padding: 20px; display: none; }
        #sidebar a { display: block; color: white; padding: 15px; text-decoration: none; cursor: pointer; }
        #content { flex-grow: 1; padding: 30px; display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3><i class="fa fa-university"></i> ZU Portal</h3>
    <a onclick="show('dashboard')"><i class="fa fa-home"></i> Dashboard</a>
    <a onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
</div>

<div id="content">
    <div id="loginPage" class="card active page">
        <h2>Login</h2>
        <input type="email" id="logEmail" placeholder="Email">
        <input type="password" id="logPass" placeholder="Password">
        <button onclick="loginUser()">Ingia</button>
        <p>Huna akaunti? <span onclick="show('signupPage')" style="color:blue; cursor:pointer;">Jisajili</span></p>
    </div>

    <div id="signupPage" class="card page">
        <h2>Jisajili</h2>
        <input type="text" id="regNo" placeholder="Reg No (e.g. BIT/2026/001)">
        <input type="tel" id="phone" placeholder="Namba ya Simu">
        <input type="email" id="signEmail" placeholder="Email">
        <input type="password" id="signPass" placeholder="Password">
        <button onclick="signupUser()">Jisajili</button>
        <p><span onclick="show('loginPage')" style="color:blue; cursor:pointer;">Rudi Login</span></p>
    </div>

    <div id="dashboard" class="card page">
        <h2>Karibu Mwanafunzi</h2>
        <input type="text" id="attendName" placeholder="Jina Kamili">
        <button onclick="submitAttendance()" style="background:green;">Hifadhi Mahudhurio</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDxeh9-9_3y7HuI77jpubKnbU39xcbojs0",
      authDomain: "attendancesystem-ecd0a.firebaseapp.com",
      databaseURL: "https://attendancesystem-ecd0a-default-rtdb.firebaseio.com",
      projectId: "attendancesystem-ecd0a",
      storageBucket: "attendancesystem-ecd0a.firebasestorage.app",
      messagingSenderId: "505261139314",
      appId: "1:505261139314:web:102548d4bc808ad31fa9eb"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = app.auth();
    const db = app.database();

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function signupUser() {
        try {
            const email = document.getElementById('signEmail').value;
            const pass = document.getElementById('signPass').value;
            const reg = document.getElementById('regNo').value;
            const phone = document.getElementById('phone').value;
            const userCred = await auth.createUserWithEmailAndPassword(email, pass);
            await db.ref('users/' + userCred.user.uid).set({ regNo: reg, phone: phone });
            alert("Usajili umefanikiwa!");
            show('loginPage');
        } catch(e) { alert(e.message); }
    }

    function loginUser() {
        auth.signInWithEmailAndPassword(document.getElementById('logEmail').value, document.getElementById('logPass').value)
        .then(() => {
            document.getElementById('sidebar').style.display = 'block';
            show('dashboard');
        }).catch(e => alert(e.message));
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    function submitAttendance() { alert("Mahudhurio yamehifadhiwa!"); }
</script>
</body>
</html>
