<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System | Karibu</title>
    <style>
        /* CSS kwa ajili ya kupendezesha ukurasa */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; margin-bottom: 25px; opacity: 0.9; }
        .btn {
            background-color: #ff7e5f;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background-color: #feb47b; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="container">
        <h1>Attendance System</h1>
        <p>Mfumo wa kisasa wa kudhibiti mahudhurio kwa ufanisi.</p>
        <a href="#" class="btn">Anza Kuingia</a>
    </div>

</body>
</html>
