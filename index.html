<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Zanzibar University Attendance</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #attendanceArea { display: none; margin-top: 20px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>Zanzibar University Attendance</h2>
    <input type="text" id="name" placeholder="Jina Kamili">
    <input type="text" id="regNo" placeholder="Namba ya Usajili">
    <button id="submitBtn">Hifadhi Mahudhurio</button>
    <p id="message"></p>

    <div id="attendanceArea">
        <h3>Orodha ya Waliohudhuria:</h3>
        <table>
            <thead><tr><th>Jina</th><th>Namba</th><th>Muda</th></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDxeh9-9_3y7HuI77jpubKnbU39xcbojs0",
      authDomain: "attendancesystem-ecd0a.firebaseapp.com",
      databaseURL: "https://attendancesystem-ecd0a-default-rtdb.firebaseio.com",
      projectId: "attendancesystem-ecd0a",
      storageBucket: "attendancesystem-ecd0a.firebasestorage.app",
      messagingSenderId: "505261139314",
      appId: "1:505261139314:web:102548d4bc808ad31fa9eb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Kurata za katikati ya Chuo
    const TARGET_LAT = -6.223173; 
    const TARGET_LONG = 39.312906;

    document.getElementById('submitBtn').addEventListener('click', () => {
        const msg = document.getElementById('message');
        msg.innerText = "Inakagua eneo, tafadhali subiri...";

        navigator.geolocation.getCurrentPosition((pos) => {
            const dist = getDist(pos.coords.latitude, pos.coords.longitude, TARGET_LAT, TARGET_LONG);
            
            // TUMEPANUA GEFENCE HADI KM 2 (2000m)
            if (dist <= 2.0) { 
                saveAndShow();
            } else {
                msg.innerText = "❌ Upo nje ya eneo la Chuo. (Umbali: " + (dist*1000).toFixed(0) + "m)";
            }
        }, (err) => { 
            msg.innerText = "Tafadhali washa GPS/Location!"; 
        }, {enableHighAccuracy: true, timeout: 10000});
    });

    function saveAndShow() {
        const n = document.getElementById('name').value;
        const r = document.getElementById('regNo').value;
        if(!n || !r) return alert("Jaza taarifa!");

        db.ref('attendance/').push({ jina: n, namba: r, muda: new Date().toLocaleTimeString() });
        document.getElementById('attendanceArea').style.display = "block";
        document.getElementById('message').innerText = "✅ Mahudhurio yamehifadhiwa!";
        loadData();
    }

    function loadData() {
        db.ref('attendance/').on('value', (s) => {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";
            s.forEach((c) => {
                const d = c.val();
                body.innerHTML += `<tr><td>${d.jina}</td><td>${d.namba}</td><td>${d.muda}</td></tr>`;
            });
        });
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1) * Math.PI/180;
        const dLon = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
</body>
</html>
