<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZU Attendance Pro</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #ecf0f1; margin: 0; padding: 0; }
        
        /* Navigation/Tabs */
        .nav { display: flex; background: var(--primary); color: white; justify-content: space-around; padding: 15px; }
        .nav-item { cursor: pointer; opacity: 0.7; }
        .nav-item.active { opacity: 1; border-bottom: 2px solid white; }

        .container { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        
        .page { display: none; }
        .page.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
        th { color: var(--primary); }
    </style>
</head>
<body>

<div class="nav" id="mainNav" style="display:none;">
    <div class="nav-item active" onclick="showPage('home')">Dashboard</div>
    <div class="nav-item" onclick="showPage('admin')">Admin</div>
</div>

<div class="container">
    <div id="loginPage" class="page active">
        <h2>Ingia kwenye Mfumo</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()" style="background:var(--accent);">Ingia Sasa</button>
        <button onclick="signup()" style="background:#7f8c8d;">Jisajili (Sign Up)</button>
    </div>

    <div id="homePage" class="page">
        <h3>Mahudhurio ya Chuo</h3>
        <input type="text" id="name" placeholder="Jina Kamili">
        <input type="text" id="regNo" placeholder="Namba ya Usajili">
        <button id="submitBtn" style="background:var(--success);">Tuma Mahudhurio</button>
        <button onclick="logout()" style="background:var(--danger);">Toka</button>
        <p id="message"></p>
        <div style="max-height: 200px; overflow-y: auto;">
            <table><thead><tr><th>Jina</th><th>Muda</th></tr></thead><tbody id="tableBody"></tbody></table>
        </div>
    </div>

    <div id="adminPage" class="page">
        <h3>Admin Panel</h3>
        <input type="password" id="adminPass" placeholder="Admin Password">
        <button onclick="downloadCSV()" style="background:var(--accent);">Download Ripoti (CSV)</button>
        <button onclick="clearData()" style="background:var(--danger);">Futa Data Zote</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    // --- SETUP NA GEOFENCE ---
    const firebaseConfig = { /* (WEKA CONFIG YAKO HAPA) */ };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); const db = firebase.database();

    // --- NAVIGATION LOGIC ---
    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // --- FUNCTIONALITY (HII NI ILE ILE ILIYOTHIBITIKA) ---
    // ... [Jumuisha functions zako za Login, Attendance, Geofencing, CSV hapa] ...

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('homePage').classList.add('active');
            document.getElementById('mainNav').style.display = 'flex';
            loadData();
        } else {
            document.getElementById('loginPage').classList.add('active');
            document.getElementById('homePage').classList.remove('active');
            document.getElementById('mainNav').style.display = 'none';
        }
    });
</script>
</body>
</html>
